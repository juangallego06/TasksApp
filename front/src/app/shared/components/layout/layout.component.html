<div class="drawer lg:drawer-open">
  <input id="app-drawer" type="checkbox" class="drawer-toggle" />

  <!-- Main content -->
  <div class="drawer-content flex flex-col bg-base-100 min-h-screen">
    <!-- Mobile topbar -->
    <div class="navbar bg-base-100 border-b border-base-300 lg:hidden">
      <div class="flex-none">
        <label for="app-drawer" class="btn btn-square btn-ghost">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="inline-block h-5 w-5 stroke-current"
            fill="none"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
        </label>
      </div>

      <div class="flex-1">
        <span class="text-lg font-semibold"> Task Management System </span>
      </div>
    </div>

    <!-- Page content -->
    <main class="p-6">
      <!-- Router outlet / page content -->
      <router-outlet />
    </main>
  </div>

  <!-- Sidebar -->
  <div class="drawer-side z-50">
    <label
      for="app-drawer"
      aria-label="close sidebar"
      class="drawer-overlay"
    ></label>

    <aside class="w-64 min-h-screen bg-base-200 border-r border-base-300">
      <!-- Logo / Title -->
      <div class="px-6 py-6 border-b border-base-300">
        <h2 class="text-2xl font-bold text-primary">TasksApp</h2>

        <p class="text-sm text-base-content/70 mt-1">
          Internal Management Platform
        </p>
      </div>

      <!-- Navigation -->
      <ul class="menu p-4 text-base-content w-full gap-2">
        <li>
          <a
            routerLink="/tasks"
            routerLinkActive="bg-primary text-primary-content"
            class="font-medium rounded-lg"
          >
            📋 Tasks
          </a>
        </li>

        <li>
          <a
            routerLink="/users"
            routerLinkActive="bg-primary text-primary-content"
            class="font-medium rounded-lg transition-colors"
          >
            👤 Users
          </a>
        </li>
      </ul>

      <!-- Footer -->
      <div class="absolute bottom-0 w-64 p-4 border-t border-base-300">
        <p class="text-xs text-base-content/60">Fullstack Technical Test</p>
      </div>
    </aside>
  </div>
</div>
